<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedCopilot — Saúde Inteligente</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Quicksand', sans-serif; background: #F8FAFC; }
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    fetch('medcopilot.jsx')
      .then(r => r.text())
      .then(code => {
        // Remove import/export statements for browser compatibility
        const cleaned = code
          .replace(/^import\s+.*?from\s+['"][^'"]+['"]\s*;?\s*$/gm, '')
          .replace(/^export\s+default\s+/gm, 'var __AppComponent = ')
          .replace(/^export\s+/gm, '');

        const transformed = Babel.transform(cleaned, {
          presets: ['react'],
          plugins: []
        }).code;

        eval(transformed);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(__AppComponent));
      })
      .catch(err => {
        document.getElementById('root').innerHTML = `
          <div style="padding:40px;text-align:center;font-family:sans-serif;color:#DC2626">
            <h2>Erro ao carregar o aplicativo</h2>
            <p style="margin-top:10px;color:#666">${err.message}</p>
            <p style="margin-top:6px;color:#999;font-size:12px">Verifique o console para mais detalhes</p>
          </div>
        `;
        console.error(err);
      });
  </script>
</body>
</html>
